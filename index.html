<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラジシェア番組表</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore.js"></script>
</head>
<body>
    <div id="app">
        <h1>ラジシェア番組表</h1>
        <div id="timetable"></div>
    </div>
    <script>
        // Firebaseの設定
        const firebaseConfig = {
            // あなたのFirebase設定
        };
        
        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        
        // URLからuserIdを取得
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        
        if (userId) {
            // Firestoreからデータを取得
            firebase.firestore()
                .collection('sharedTimetables')
                .doc(userId)
                .get()
                .then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        // データを表示
                        displayTimetable(data);
                    } else {
                        document.getElementById('timetable').innerHTML = 
                            '<p>共有された番組表が見つかりません。</p>';
                    }
                })
                .catch((error) => {
                    console.error("Error:", error);
                    document.getElementById('timetable').innerHTML = 
                        '<p>データの読み込み中にエラーが発生しました。</p>';
                });
        }
        
        function displayTimetable(data) {
            // 番組表の表示ロジック
            const timetable = document.getElementById('timetable');
            timetable.innerHTML = `
                <h2>${data.userName} の番組表</h2>
                <p>${formatDate(data.startDate)}〜${formatDate(data.endDate)}</p>
                <div class="programs">
                    ${data.programs.map(program => `
                        <div class="program">
                            <h3>${program.title}</h3>
                            <p>${program.displayTime}</p>
                            <p>${program.personalities}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function formatDate(timestamp) {
            const date = timestamp.toDate();
            return date.toLocaleDateString('ja-JP', {
                month: 'numeric',
                day: 'numeric',
                weekday: 'short'
            });
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .program {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
    </style>
</body>
</html>
